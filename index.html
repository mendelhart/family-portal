<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2f3a73" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Family Portal — Yiddish &amp; English Calendar</title>
<style>
  :root{
    --ink:#1f2440; --ink2:#3a4166; --muted:#6b7192; --line:#e6e8f2;
    --bg:#f6f7fb; --card:#ffffff; --gold:#b78a2e; --gold-soft:#f4ecd8;
    --indigo:#2f3a73; --indigo-soft:#eef1fb;
    --yz:#5b6bb5; --bd:#2f9e73; --an:#c8823a; --ms:#8a5cc0;
    --danger:#c0455a; --ok:#2f9e73;
    --shadow:0 1px 3px rgba(24,30,66,.08),0 8px 24px rgba(24,30,66,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.45;-webkit-font-smoothing:antialiased}
  .heb{font-family:"Frank Ruhl Libre","Times New Roman",serif;direction:rtl;unicode-bidi:isolate}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--indigo)}
  .hidden{display:none!important}

  /* ---------- Login ---------- */
  #login{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,#3a4680 0%,#242a52 55%,#1b2044 100%);padding:20px}
  .login-card{width:100%;max-width:410px;background:var(--card);border-radius:20px;box-shadow:var(--shadow);
    padding:34px 30px;text-align:center}
  .brand-mark{width:58px;height:58px;margin:0 auto 14px;border-radius:16px;
    background:linear-gradient(140deg,var(--indigo),#4a58a6);display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:26px;box-shadow:0 6px 18px rgba(47,58,115,.35)}
  .login-card h1{font-size:22px;margin:0 0 4px}
  .login-card p.sub{color:var(--muted);margin:0 0 22px;font-size:14px}
  .field{text-align:left;margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);margin-bottom:6px}
  .field input,.field select{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fbfbfe}
  .field input:focus,.field select:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-soft)}
  .btn{border:none;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:600;background:var(--indigo);color:#fff;width:100%}
  .btn:hover{filter:brightness(1.06)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.sec{background:var(--indigo-soft);color:var(--indigo)}
  .btn.ghost{background:transparent;color:var(--indigo);border:1px solid var(--line)}
  .btn.gold{background:linear-gradient(135deg,var(--gold),#caa044);color:#3a2c08}
  .btn.danger{background:#fbe9ec;color:var(--danger)}
  .btn.sm{padding:7px 11px;font-size:13px;width:auto}
  .err{color:var(--danger);font-size:13px;min-height:18px;margin-top:2px}
  .ok{color:var(--ok);font-size:13px;min-height:18px;margin-top:2px}
  .switch{margin-top:16px;font-size:13px;color:var(--muted)}
  .switch a{cursor:pointer;font-weight:600}
  .login-hint{margin-top:16px;font-size:12px;color:var(--muted);background:var(--gold-soft);
    border:1px solid #eaddba;border-radius:10px;padding:10px 12px;text-align:left}
  .mode-tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 8px;border-radius:999px;margin-bottom:14px}
  .mode-demo{background:#fdeede;color:#8a5a12}
  .mode-live{background:#e2f4ea;color:#1f7a4d}

  /* ---------- App shell ---------- */
  #app{min-height:100vh;display:flex;flex-direction:column}
  header.topbar{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .topbar-inner{max-width:1120px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--ink)}
  .logo .m{width:34px;height:34px;border-radius:10px;background:linear-gradient(140deg,var(--indigo),#4a58a6);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px}
  .logo small{display:block;font-weight:500;font-size:11px;color:var(--muted)}
  nav.tabs{display:flex;gap:2px;margin-left:8px;flex-wrap:wrap}
  nav.tabs button{background:transparent;border:none;padding:9px 13px;border-radius:9px;font-size:14px;font-weight:600;color:var(--muted)}
  nav.tabs button.active{background:var(--indigo-soft);color:var(--indigo)}
  nav.tabs button:hover{color:var(--indigo)}
  .spacer{flex:1}
  .whoami{font-size:13px;color:var(--muted);text-align:right}
  .whoami b{color:var(--ink);display:block}
  main{max-width:1120px;width:100%;margin:0 auto;padding:22px 18px 60px;flex:1}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .page-head h2{margin:0;font-size:24px}
  .page-head p{margin:2px 0 0;color:var(--muted);font-size:14px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  .stat-row{grid-template-columns:repeat(4,1fr)}
  .stat{padding:16px 18px}
  .stat .n{font-size:28px;font-weight:700}
  .stat .l{font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}

  .ev-list{display:flex;flex-direction:column}
  .ev{display:flex;gap:14px;padding:13px 16px;border-top:1px solid var(--line);align-items:center}
  .ev:first-child{border-top:none}
  .ev .date-chip{flex:0 0 auto;width:58px;text-align:center;border-radius:10px;padding:6px 4px;background:var(--bg);border:1px solid var(--line)}
  .ev .date-chip .d{font-size:19px;font-weight:700;line-height:1}
  .ev .date-chip .mo{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600}
  .ev .body{flex:1;min-width:0}
  .ev .body .t{font-weight:600}
  .ev .body .meta{font-size:12.5px;color:var(--muted)}
  .ev .body .heb{font-size:14px;color:var(--ink2)}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;color:#fff;white-space:nowrap}
  .b-yahrzeit{background:var(--yz)} .b-birthday{background:var(--bd)}
  .b-anniversary{background:var(--an)} .b-milestone{background:var(--ms)}
  .b-holiday{background:#8a7736} .cell .b-holiday{font-style:normal}
  .b-soon{background:var(--gold);color:#3a2c08}
  .countdown{font-size:12px;color:var(--muted);white-space:nowrap;text-align:right}

  .fam-card{padding:16px 18px}
  .fam-card h3{margin:0 0 2px;font-size:17px}
  .fam-card .contact{font-size:13px;color:var(--muted);margin-bottom:8px}
  .members{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .chip{background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:12.5px}
  .chip .hn{color:var(--muted)}
  .pb-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .pb-row{border-top:1px solid var(--line);padding-top:8px;font-size:13.5px}
  .pb-row:first-child{border-top:none;padding-top:0}
  .pb-row .hn{color:var(--muted)}

  .cal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;gap:10px;flex-wrap:wrap}
  .cal-title{font-size:18px;font-weight:700}
  .cal-title .hebm{font-size:14px;color:var(--gold);font-weight:600}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-grid .dow{padding:8px 6px;text-align:center;font-size:11.5px;font-weight:700;color:var(--muted);
    text-transform:uppercase;border-top:1px solid var(--line);background:var(--bg)}
  .cell{min-height:96px;border-top:1px solid var(--line);border-left:1px solid var(--line);padding:5px 6px;position:relative;overflow:hidden;cursor:pointer}
  .cal-grid .cell:hover{box-shadow:inset 0 0 0 2px var(--indigo-soft)}
  .cal-grid .cell:nth-child(7n+1){border-left:none}
  .cell.out{background:#fafbfe;color:#b9bed4}
  .cell.today{background:var(--indigo-soft)}
  .cell .dn{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px}
  .cell .dn .g{font-weight:700}
  .cell .dn .h{font-size:12px;color:var(--gold)}
  .cell.today .dn .g{color:var(--indigo)}
  .cell .ev-dot{margin-top:3px;font-size:10.5px;padding:1px 5px;border-radius:5px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .cell .ev-av{width:12px;height:12px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:3px;display:inline-block}
  .cell .more{font-size:10px;color:var(--muted);margin-top:2px}
  .avatar{border-radius:50%;object-fit:cover;vertical-align:middle;border:1px solid var(--line)}
  .tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px;margin-top:8px}
  .tpl-swatch{border:1px solid var(--line);border-radius:10px;background:#fff;padding:0;overflow:hidden;text-align:left;cursor:pointer}
  .tpl-swatch:hover{box-shadow:var(--shadow);border-color:var(--indigo)}
  .tpl-swatch .sw-bar{height:14px;display:block}
  .tpl-swatch .sw-body{display:block;padding:12px 10px;min-height:46px;border-top:1px solid;position:relative}
  .tpl-swatch .sw-num{font-weight:700;font-size:16px}
  .tpl-swatch .sw-dot{position:absolute;right:8px;bottom:8px;width:9px;height:9px;border-radius:50%}
  .tpl-swatch .sw-name{display:block;padding:6px 9px;font-size:11px;font-weight:600;border-top:1px solid var(--line);color:var(--ink2)}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 12px;font-size:13.5px;border-top:1px solid var(--line)}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);background:var(--bg)}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  select,input[type=text],input[type=date],input[type=tel],input[type=email],input[type=password],textarea{
    padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fbfbfe;width:100%}
  textarea{min-height:64px;resize:vertical}
  label.fl{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);margin:0 0 5px}

  .modal-bg{position:fixed;inset:0;background:rgba(20,24,52,.5);z-index:40;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow:auto}
  .modal{background:var(--card);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:560px;padding:22px 22px 20px}
  .modal h3{margin:0 0 4px;font-size:19px}
  .modal .sub{color:var(--muted);font-size:13px;margin:0 0 16px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .full{grid-column:1/-1}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
  .sub-list{margin-top:8px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .sub-list .item{display:flex;gap:8px;align-items:center;padding:8px 10px;border-top:1px solid var(--line);font-size:13px}
  .sub-list .item:first-child{border-top:none}
  .sub-list .item .grow{flex:1}
  .note{font-size:12.5px;color:var(--muted)}
  .banner{background:var(--gold-soft);border:1px solid #eaddba;border-radius:12px;padding:12px 14px;font-size:13px;color:#6a5518;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
  .banner b{color:#5a480f}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--indigo-soft);color:var(--indigo)}
  .empty{padding:40px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:6px}
  footer.foot{text-align:center;color:var(--muted);font-size:12px;padding:18px}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:#232a52;color:#fff;padding:10px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);max-width:90vw}
  .toast.bad{background:#8f2f40}
  @media(max-width:720px){
    .stat-row{grid-template-columns:repeat(2,1fr)}
    .form-grid{grid-template-columns:1fr}
    main{padding:16px 12px 84px}
    .page-head h2{font-size:21px}
    /* compact header: brand + actions on row 1, swipeable tabs on row 2 */
    .topbar-inner{flex-wrap:wrap;gap:8px;padding:10px 12px}
    .logo{flex:1;min-width:0}
    .logo span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
    .logo small{display:none}
    .spacer{display:none}
    .whoami{display:none}
    #bellBtn,#logoutBtn{flex:0 0 auto}
    nav.tabs{order:5;width:100%;margin:2px -12px -4px;padding:2px 12px 4px;
      flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:4px;
      border-top:1px solid var(--line);scrollbar-width:none}
    nav.tabs::-webkit-scrollbar{display:none}
    nav.tabs button{flex:0 0 auto;white-space:nowrap;padding:9px 12px}
    table th,table td{padding:8px 9px;font-size:12.5px}
    .modal{padding:18px 16px 16px}
  }
  /* ---------- Designed print / PDF ---------- */
  #printArea{display:none}
  @media print{
    body{background:#fff}
    #login,#app,#modalRoot,#toast{display:none!important}
    #printArea{display:block!important;font-family:Georgia,'Times New Roman',serif;color:#1b2140}
    @page{margin:15mm 14mm}
    .pr-head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px double #2f3a73;padding-bottom:10px;margin-bottom:18px}
    .pr-title{font-size:23px;font-weight:700;letter-spacing:.01em}
    .pr-sub{font-size:11px;color:#555;text-align:right;line-height:1.5}
    .pr-fam{break-inside:avoid;margin-bottom:16px}
    .pr-fam h3{font-size:14.5px;margin:0 0 5px;border-bottom:1px solid #b9c0d8;padding-bottom:3px}
    .pr-fam h3 .addr{font-weight:400;font-size:11px;color:#555}
    table.pr{width:100%;border-collapse:collapse;font-size:11.5px}
    table.pr th{text-align:left;border-bottom:1.5px solid #2f3a73;padding:5px 8px;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#2f3a73}
    table.pr td{padding:4px 8px;border-bottom:1px solid #e4e6f0;vertical-align:top}
    table.pr tr{break-inside:avoid}
    .pr-month{font-weight:700;color:#2f3a73;font-size:12.5px;margin:16px 0 4px;break-after:avoid}
    #printArea .heb{font-family:'Frank Ruhl Libre','Times New Roman',serif;direction:rtl;unicode-bidi:isolate}
    .pr-foot{margin-top:14px;padding-top:8px;border-top:1px solid #ccc;font-size:10px;color:#888;text-align:center}
    #printArea, #printArea *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .cal-print{font-family:var(--pcf);color:#1b2140}
    .cal-print .pc-band{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--pca);padding-bottom:8px;margin-bottom:8px}
    .cal-print .pc-title{font-size:26px;font-weight:700;color:var(--pct);line-height:1}
    .cal-print .pc-hebm{font-size:15px;color:var(--pca);margin-top:3px}
    .cal-print .pc-sub{font-size:11px;color:#555;text-align:right;line-height:1.5}
    table.pcal{width:100%;border-collapse:collapse;table-layout:fixed}
    table.pcal th{background:var(--pch);color:var(--pcfg);padding:6px 4px;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--pcl)}
    table.pcal td{border:1px solid var(--pcl);height:0.95in;vertical-align:top;padding:3px 5px;overflow:hidden}
    .cal-print .pc-band{margin-bottom:6px;padding-bottom:6px}
    .cal-print .pc-title{font-size:22px}
    table.pcal td.out{background:var(--pco);color:#b7b7b7}
    .cal-print .pc-dnum{font-weight:700;font-size:15px;color:var(--pcn)}
    .cal-print .pc-dheb{float:right;font-size:11px;color:var(--pca);font-family:'Frank Ruhl Libre',serif}
    .cal-print .pc-hol{color:var(--pchl);font-weight:600;font-size:9px;display:block;margin-top:1px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cal-print .pc-ev{font-size:9px;display:block;margin-top:1px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cal-print .pc-ev .dotc{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:middle}
    .cal-print .pc-ev img{width:12px;height:12px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:3px}
  }
  @media(max-width:560px){
    /* phones: show short event names, tap a day for full details */
    .cell{min-height:66px;padding:3px 3px}
    .cell .dn .g{font-size:12px}
    .cell .dn .h{font-size:9.5px}
    .cell .ev-dot{font-size:8px;padding:1px 3px;margin-top:2px;border-radius:4px;line-height:1.35}
    .cell .more{display:block;font-size:8px}
    .cell .ev-av{width:10px;height:10px}
    .cal-head{padding:12px 10px}
    .cal-title{font-size:16px}
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login">
  <div class="login-card">
    <div class="brand-mark"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/><circle cx="8.5" cy="14" r="1.1" fill="#fff" stroke="none"/><circle cx="12" cy="14" r="1.1" fill="#fff" stroke="none"/><circle cx="15.5" cy="14" r="1.1" fill="#fff" stroke="none"/></svg></div>
    <div id="modeTag"></div>
    <h1 id="loginTitle">Family Portal</h1>
    <p class="sub">Yiddish &amp; English calendar · contacts &amp; simchas</p>
    <div id="loginBody"></div>
    <div class="login-hint" id="loginHint"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <div class="m"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/><circle cx="8.5" cy="14" r="1.1" fill="#fff" stroke="none"/><circle cx="12" cy="14" r="1.1" fill="#fff" stroke="none"/><circle cx="15.5" cy="14" r="1.1" fill="#fff" stroke="none"/></svg></div>
        <div><span id="commName">Family Portal</span><small>Yiddish &amp; English calendar</small></div>
      </div>
      <nav class="tabs" id="tabs">
        <button data-tab="dashboard" class="active">Dashboard</button>
        <button data-tab="calendar">Calendar</button>
        <button data-tab="events">Events</button>
        <button data-tab="directory">Directory</button>
        <button data-tab="household">My Household</button>
        <button data-tab="admin" id="tabAdmin">Admin</button>
      </nav>
      <div class="spacer"></div>
      <button class="btn ghost sm" id="bellBtn" title="Turn on reminders">🔔</button>
      <div class="whoami"><b id="waName">—</b><span id="waRole"></span></div>
      <button class="btn ghost sm" id="logoutBtn">Log out</button>
    </div>
  </header>
  <main id="view"></main>
  <footer class="foot">Self-contained family portal · dates by the Hebrew (Yiddish) calendar · <span id="todayHeb"></span></footer>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script type="module">
const { HDate, gematriya, HebrewCalendar } = window.hebcal;

/* ============================================================
   ⚙️  CONFIG  — paste your free Supabase project keys here to
   turn on real multi-family logins + shared cloud data.
   Leave BOTH blank to run in local DEMO mode (username + PIN,
   data saved only in this browser). See SETUP.md.
   ============================================================ */
const SUPABASE_URL      = '';   // e.g. 'https://abcd1234.supabase.co'
const SUPABASE_ANON_KEY = '';   // the "anon public" key
const VAPID_PUBLIC_KEY  = '';   // for app push notifications when closed (see SETUP.md → Reminders)
const BACKEND = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

let supa = null;
if (BACKEND) {
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  supa = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

/* ============================================================
   STATE
   ============================================================ */
const LS_KEY = 'familyPortalData.v1';
const SS_KEY = 'familyPortalSession';
function uid(){ return (self.crypto && crypto.randomUUID) ? crypto.randomUUID() : 'id'+Math.random().toString(36).slice(2,10); }

// In-memory shape used by all views:
// DB = { meta:{communityName}, families:[ {id, householdName, username?, contact:{phone,email,address}, members:[], events:[]} ] }
let DB = { meta:{ communityName:'Our Family Portal' }, families:[] };
let SESSION = null; // { isAdmin, familyId|null, name, email? }

const $ = s => document.querySelector(s);
function toast(msg, bad=false){
  const t=document.createElement('div'); t.className='toast'+(bad?' bad':''); t.textContent=msg;
  $('#toast').appendChild(t); setTimeout(()=>t.remove(), 3200);
}

/* ============================================================
   DEMO SEED (used only in demo mode / first run)
   ============================================================ */
const SEED = {
  meta:{ communityName:'Our Family Portal', adminUser:'admin', adminPin:'1234' },
  families:[
    { id:uid(), householdName:'Cohen', username:'cohen', pin:'1111',
      contact:{ phone:'(514) 555-0142', email:'cohen@example.com', address:'120 Hutchison St, Montreal' },
      members:[
        { id:uid(), firstName:'Yaakov', lastName:'Cohen', hebrewName:'יעקב', relation:'Father', birthday:'1979-06-05' },
        { id:uid(), firstName:'Rivka', lastName:'Cohen', hebrewName:'רבקה', relation:'Mother', birthday:'1982-11-20' },
        { id:uid(), firstName:'Moishe', lastName:'Cohen', hebrewName:'משה', relation:'Son', birthday:'2012-03-18' } ],
      events:[
        { id:uid(), type:'anniversary', title:'Yaakov & Rivka', gregDate:'2005-08-14', recurrence:'hebrew', notes:'Wedding' },
        { id:uid(), type:'yahrzeit', title:'Avraham Cohen (grandfather)', gregDate:'1998-02-11', recurrence:'hebrew', notes:'Zaidy' },
        { id:uid(), type:'milestone', title:'Moishe — Bar Mitzvah', gregDate:'2025-03-27', recurrence:'hebrew', notes:'' } ] },
    { id:uid(), householdName:'Friedman', username:'friedman', pin:'2222',
      contact:{ phone:'(514) 555-0199', email:'friedman@example.com', address:'55 Bernard Ave, Outremont' },
      members:[
        { id:uid(), firstName:'Shloime', lastName:'Friedman', hebrewName:'שלמה', relation:'Father', birthday:'1975-09-30' },
        { id:uid(), firstName:'Chana', lastName:'Friedman', hebrewName:'חנה', relation:'Mother', birthday:'1978-01-12' } ],
      events:[
        { id:uid(), type:'anniversary', title:'Shloime & Chana', gregDate:'2001-06-24', recurrence:'hebrew', notes:'Wedding' },
        { id:uid(), type:'yahrzeit', title:'Sarah Friedman (mother)', gregDate:'2019-12-02', recurrence:'hebrew', notes:'' } ] }
  ]
};

/* ============================================================
   STORE  — two implementations behind one async interface
   ============================================================ */
const DemoStore = {
  mode:'demo',
  loadLocal(){
    try{ const raw=localStorage.getItem(LS_KEY); if(raw) return JSON.parse(raw); }catch(e){}
    const s=JSON.parse(JSON.stringify(SEED)); localStorage.setItem(LS_KEY, JSON.stringify(s)); return s;
  },
  persist(){ localStorage.setItem(LS_KEY, JSON.stringify(FULL)); },
  async boot(){ FULL = this.loadLocal(); DB.meta.communityName = FULL.meta.communityName;
    DB.families = FULL.families;
    try{ const s=sessionStorage.getItem(SS_KEY); if(s){ const sess=JSON.parse(s);
      if(sess.isAdmin || FULL.families.some(f=>f.id===sess.familyId)){ SESSION=sess; return true; } } }catch(e){}
    return false;
  },
  async login(u,p){ u=(u||'').trim().toLowerCase(); p=(p||'').trim();
    if(u===FULL.meta.adminUser.toLowerCase() && p===FULL.meta.adminPin){ SESSION={isAdmin:true,familyId:null,name:'Administrator'}; }
    else { const f=FULL.families.find(x=>(x.username||'').toLowerCase()===u && String(x.pin)===p);
      if(!f) throw new Error('Incorrect username or PIN.'); SESSION={isAdmin:false,familyId:f.id,name:f.householdName+' family'}; }
    sessionStorage.setItem(SS_KEY, JSON.stringify(SESSION)); return true;
  },
  async logout(){ sessionStorage.removeItem(SS_KEY); SESSION=null; },
  async saveHousehold(f){ this.persist(); },
  async saveMember(fid,m){ this.persist(); },
  async deleteMember(fid,mid){ this.persist(); },
  async saveEvent(fid,e){ this.persist(); },
  async deleteEvent(fid,eid){ this.persist(); },
  async createHousehold(f){ this.persist(); return f.id; },
  async deleteHousehold(fid){ this.persist(); },
  async saveSettings(){ FULL.meta.communityName=DB.meta.communityName; this.persist(); },
  async saveAuthMeta(fid){ this.persist(); },       // demo: username/pin live on the family
  async saveAdminCreds(u,p){ FULL.meta.adminUser=u; FULL.meta.adminPin=p; this.persist(); },
  exportAll(){ return FULL; },
  importAll(data){ FULL=data; DB.meta.communityName=data.meta.communityName; DB.families=data.families; this.persist(); },
  resetAll(){ FULL=JSON.parse(JSON.stringify(SEED)); DB.meta.communityName=FULL.meta.communityName; DB.families=FULL.families; this.persist(); }
};
let FULL = null; // demo full object (includes admin creds + pins)

const SupaStore = {
  mode:'backend',
  async boot(){
    const { data:{ session } } = await supa.auth.getSession();
    if(!session) return false;
    return await this.hydrate(session);
  },
  async hydrate(session){
    // profile
    let { data:prof } = await supa.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
    if(!prof){ // create a blank profile row on first login
      await supa.from('profiles').insert({ id:session.user.id, display_name:session.user.email }).select();
      prof = { id:session.user.id, household_id:null, is_admin:false };
    }
    SESSION = { isAdmin:!!prof.is_admin, familyId:prof.household_id, name:session.user.email, email:session.user.email, needsHousehold:!prof.household_id && !prof.is_admin };
    await this.loadAll();
    return true;
  },
  async loadAll(){
    const [{ data:hh }, { data:mm }, { data:ee }, { data:st }] = await Promise.all([
      supa.from('households').select('*').order('name'),
      supa.from('members').select('*'),
      supa.from('events').select('*'),
      supa.from('settings').select('*')
    ]);
    const fam = (hh||[]).map(h=>({ id:h.id, householdName:h.name,
      contact:{ phone:h.phone||'', email:h.email||'', address:h.address||'' }, members:[], events:[] }));
    const byId = Object.fromEntries(fam.map(f=>[f.id,f]));
    (mm||[]).forEach(m=>{ const f=byId[m.household_id]; if(f) f.members.push(
      { id:m.id, firstName:m.first_name, lastName:m.last_name, hebrewName:m.hebrew_name, relation:m.relation, birthday:m.birthday||'', phone:m.phone||'', cell:m.cell||'', email:m.email||'', photo:m.photo||'' }); });
    (ee||[]).forEach(e=>{ const f=byId[e.household_id]; if(f) f.events.push(
      { id:e.id, type:e.type, title:e.title, gregDate:e.greg_date, recurrence:e.recurrence, frequency:e.frequency||'yearly', recurTitle:e.recur_title||'', notes:e.notes||'', photo:e.photo||'', remind:e.remind||undefined }); });
    DB.families = fam;
    const cn = (st||[]).find(s=>s.key==='communityName');
    DB.meta.communityName = cn ? cn.value : 'Our Family Portal';
  },
  async login(email,pass){
    const { error } = await supa.auth.signInWithPassword({ email:(email||'').trim(), password:pass });
    if(error) throw new Error(error.message);
    const { data:{ session } } = await supa.auth.getSession();
    await this.hydrate(session); return true;
  },
  async signup(email,pass){
    const { data, error } = await supa.auth.signUp({ email:(email||'').trim(), password:pass });
    if(error) throw new Error(error.message);
    if(data.session){ await this.hydrate(data.session); return { signedIn:true }; }
    return { signedIn:false }; // email confirmation required
  },
  async logout(){ await supa.auth.signOut(); SESSION=null; },
  async setMyHousehold(hid){
    const { data:{ session } } = await supa.auth.getSession();
    const { error } = await supa.from('profiles').update({ household_id:hid }).eq('id', session.user.id);
    if(error) throw new Error(error.message);
    SESSION.familyId=hid; SESSION.needsHousehold=false;
  },
  async listHouseholdsPublic(){ const { data } = await supa.from('households').select('id,name').order('name'); return data||[]; },
  async saveHousehold(f){ const { error } = await supa.from('households').update(
      { name:f.householdName, phone:f.contact.phone, email:f.contact.email, address:f.contact.address }).eq('id', f.id);
    if(error) throw new Error(error.message); },
  async createHousehold(f){ const { data, error } = await supa.from('households').insert(
      { name:f.householdName, phone:f.contact?.phone||'', email:f.contact?.email||'', address:f.contact?.address||'' }).select().single();
    if(error) throw new Error(error.message); f.id=data.id; return data.id; },
  async deleteHousehold(fid){ const { error } = await supa.from('households').delete().eq('id', fid); if(error) throw new Error(error.message); },
  async saveMember(fid,m){ const row={ household_id:fid, first_name:m.firstName, last_name:m.lastName,
      hebrew_name:m.hebrewName, relation:m.relation, birthday:m.birthday||null, phone:m.phone||'', cell:m.cell||'', email:m.email||'', photo:m.photo||'' };
    const exists = await supa.from('members').select('id').eq('id', m.id).maybeSingle();
    let error;
    if(exists.data){ ({ error } = await supa.from('members').update(row).eq('id', m.id)); }
    else { ({ error } = await supa.from('members').insert({ id:m.id, ...row })); }
    if(error) throw new Error(error.message); },
  async deleteMember(fid,mid){ const { error } = await supa.from('members').delete().eq('id', mid); if(error) throw new Error(error.message); },
  async saveEvent(fid,e){ const row={ household_id:fid, type:e.type, title:e.title, greg_date:e.gregDate, recurrence:e.recurrence, frequency:e.frequency||'yearly', recur_title:e.recurTitle||'', notes:e.notes, photo:e.photo||'', remind:e.remind||null };
    const exists = await supa.from('events').select('id').eq('id', e.id).maybeSingle();
    let error;
    if(exists.data){ ({ error } = await supa.from('events').update(row).eq('id', e.id)); }
    else { ({ error } = await supa.from('events').insert({ id:e.id, ...row })); }
    if(error) throw new Error(error.message); },
  async deleteEvent(fid,eid){ const { error } = await supa.from('events').delete().eq('id', eid); if(error) throw new Error(error.message); },
  async saveSettings(){ const { error } = await supa.from('settings').upsert({ key:'communityName', value:DB.meta.communityName });
    if(error) throw new Error(error.message); }
};

const Store = BACKEND ? SupaStore : DemoStore;

/* ============================================================
   HEBREW CALENDAR ENGINE
   ============================================================ */
const HEB_MONTH_HE = {1:'ניסן',2:'אייר',3:'סיון',4:'תמוז',5:'אב',6:'אלול',7:'תשרי',8:'חשון',9:'כסלו',10:'טבת',11:'שבט',12:'אדר',13:'אדר ב׳'};
const HEB_MONTH_EN = {1:'Nisan',2:'Iyar',3:'Sivan',4:'Tammuz',5:'Av',6:'Elul',7:'Tishrei',8:'Cheshvan',9:'Kislev',10:'Tevet',11:'Shevat',12:'Adar',13:'Adar II'};

function dateKey(dt){ return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function hFromGreg(dt){ return new HDate(dt); }
function hebLabel(hd){ return { he:hd.renderGematriya(), en:hd.render('en') }; }

  const out=[]; const orig=gregToDate(ev.gregDate);
  if(ev.frequency==='once'){ if(orig>=start && orig<=end) out.push({ date:orig, years:0, hdate:hFromGreg(orig) }); return out; }
  if(ev.recurrence==='gregorian'){
    for(let yr=start.getFullYear(); yr<=end.getFullYear(); yr++){
      const d=new Date(yr, orig.getMonth(), orig.getDate(), 12);
      if(d.getMonth()!==orig.getMonth()) continue;
      if(d>=start && d<=end) out.push({ date:d, years:yr-orig.getFullYear() });
    }
    return out;
  }
  const oh=hFromGreg(orig); const oy=oh.getFullYear(), om=oh.getMonth(), od=oh.getDate();
  const hyStart=hFromGreg(start).getFullYear(), hyEnd=hFromGreg(end).getFullYear();
  for(let hy=hyStart-1; hy<=hyEnd+1; hy++){
    let m=om;
    if(om===12 && HDate.isLeapYear(hy) && !HDate.isLeapYear(oy)) m=13;
    if(om===13 && !HDate.isLeapYear(hy)) m=12;
    let dim; try{ dim=HDate.daysInMonth(m,hy); }catch(e){ continue; }
    const d=Math.min(od,dim);
    let occ; try{ occ=new HDate(d,m,hy); }catch(e){ continue; }
    const g=occ.greg(); g.setHours(12,0,0,0);
    if(g>=start && g<=end) out.push({ date:g, years:hy-oy, hdate:occ });
  }
  return out;
}
function familyEvents(fam){
  const evs=[];
  (fam.members||[]).forEach(m=>{ if(m.birthday) evs.push({ id:m.id+'_bd', type:'birthday',
    title:(m.firstName+' '+(m.lastName||'')).trim(), gregDate:m.birthday, recurrence:'hebrew', notes:'',
    hebrewName:m.hebrewName, photo:m.photo||'', familyId:fam.id, householdName:fam.householdName }); });
  (fam.events||[]).forEach(e=>evs.push({ ...e, familyId:fam.id, householdName:fam.householdName }));
  return evs;
}
function allEvents(){ return DB.families.flatMap(familyEvents); }

/* ---- Standard observant holidays (via bundled engine) ---- */
const YEAR_MIN = new Date().getFullYear() - 75;
const YEAR_MAX = new Date().getFullYear() + 20;
let ISRAEL = false; // diaspora observance by default
function holidaysInRange(start, end){
  let evs;
  try{
    evs = HebrewCalendar.calendar({ start:new HDate(start), end:new HDate(end),
      il:ISRAEL, sedrot:false, candlelighting:false, omer:false, noModern:false, noMinorFast:false, noRoshChodesh:false });
  }catch(e){ return []; }
  return evs.map(ev=>{ const g=ev.getDate().greg(); g.setHours(12,0,0,0);
    return { date:g, label:ev.render('en'), heLabel:ev.render('he') }; });
}
function holidayBuckets(start,end){ const b={}; holidaysInRange(start,end).forEach(h=>{ const k=dateKey(h.date); (b[k]=b[k]||[]).push(h); }); return b; }

/* ---- Reminder helpers ---- */
function defaultRemind(){ return { on:false, daysBefore:7, channels:{ browser:true, push:true, email:false }, notify:'family', emails:'' }; }
// returns events whose next occurrence falls within their reminder window (from today)
function dueReminders(withinDays=60){
  const start=new Date(); start.setHours(0,0,0,0);
  const end=new Date(start); end.setDate(end.getDate()+withinDays);
  const due=[];
  allEvents().forEach(ev=>{
    const r = ev.remind; if(!r || !r.on) return;
    occurrencesInRange(ev, start, end).forEach(o=>{
      const days=Math.round((new Date(o.date).setHours(0,0,0,0)-start)/86400000);
      if(days<=(r.daysBefore||7)) due.push({ ...ev, occ:o.date, years:o.years, daysUntil:days });
    });
  });
  return due.sort((a,b)=>a.occ-b.occ);
}

function upcoming(days=90){

function fmtCountdown(dt){ const now=new Date(); now.setHours(0,0,0,0); const d=new Date(dt); d.setHours(0,0,0,0);
  const diff=Math.round((d-now)/86400000); if(diff===0)return'Today'; if(diff===1)return'Tomorrow'; return 'in '+diff+' days'; }
function renderDashboard(){
  const list=upcoming(90);

  allEvents().forEach(e=>counts[e.type]!==undefined && counts[e.type]++);

  const rows=list.slice(0,40).map(ev=>{ const d=ev.occ, hl=hebLabel(ev.hdate); const soon=fmtCountdown(d);
    const isSoon=(new Date(d).setHours(0,0,0,0)-new Date().setHours(0,0,0,0))<=7*86400000;
    let sub=''; if(ev.type==='yahrzeit') sub=ev.years>0?ORD(ev.years)+' yahrzeit':'Yahrzeit';
    else if(ev.type==='anniversary') sub=ev.years>0?ORD(ev.years)+' anniversary':'Anniversary';
    else if(ev.type==='birthday') sub=ev.years>0?'turning '+ev.years:'Birthday'; else sub=ev.notes||'Milestone';
    return `<div class="ev"><div class="date-chip"><div class="d">${d.getDate()}</div><div class="mo">${MO[d.getMonth()]}</div></div>
      <div class="body"><div class="t">${ev.photo?`<img src="${ev.photo}" class="avatar" style="width:22px;height:22px;margin-right:5px">`:''}${esc(occLabel(ev,ev.years))} <span class="badge ${TYPE_BADGE[ev.type]}">${TYPE_LABEL[ev.type]}</span></div>
      <div class="heb"><span class="heb">${hl.he}</span> · ${hl.en}</div>
      <div class="meta">${esc(ev.householdName)} family · ${sub}</div></div>
      <div class="countdown">${isSoon?'<span class="badge b-soon">'+soon+'</span>':soon}</div></div>`;
  }).join('');
  return `<div class="page-head"><div><h2>Dashboard</h2><p>Upcoming simchas &amp; yahrzeits over the next 90 days — by the Yiddish calendar.</p></div></div>
  <div class="grid stat-row" style="margin-bottom:18px">
    <div class="card stat"><div class="n">${DB.families.length}</div><div class="l">Families</div></div>

  <div class="card"><div class="cal-head"><div class="cal-title">Coming up</div><div class="note">${list.length} event(s) in the next 90 days</div></div>
  <div class="ev-list">${rows||'<div class="empty"><div class="big">🕊️</div>No events in the next 90 days.</div>'}</div></div>`;
}

    const out=dt.getMonth()!==calMonth; const hd=hFromGreg(dt); const k=dateKey(dt);
    const hols=hbuckets[k]||[]; const evs=buckets[k]||[];
    const holShown=hols.slice(0,2).map(h=>`<span class="ev-dot b-holiday" title="${esc(h.label)}">${esc(h.label)}</span>`).join('');
    const evShown=evs.slice(0,2).map(ev=>`<span class="ev-dot ${TYPE_BADGE[ev.type]}" title="${esc(ev._label||ev.title)} (${esc(ev.householdName)})">${ev.photo?`<img src="${ev.photo}" class="ev-av">`:''}${esc(ev._label||ev.title)}</span>`).join('');
    const extra=(hols.length-Math.min(2,hols.length))+(evs.length-Math.min(2,evs.length));
    const more=extra>0?`<div class="more">+${extra} more</div>`:'';
    html+=`<div class="cell ${out?'out':''} ${k===todayKey?'today':''}" data-date="${k}"><div class="dn"><span class="g">${dt.getDate()}</span><span class="h heb">${gematriya(hd.getDate())}</span></div>${holShown}${evShown}${more}</div>`; }
  $('#calGrid').innerHTML=html;
}

/* ============================================================
   EXPORTS: vCard (phone book), CSV, iCalendar (.ics)
   ============================================================ */
function download(name, text, mime){ const blob=new Blob([text],{type:mime||'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
function allMembers(){ return DB.families.flatMap(f=>(f.members||[]).map(m=>({m,f}))); }
function memberVCard(m, fam){ const c=fam.contact||{};
  const full=`${m.firstName||''} ${m.lastName||fam.householdName||''}`.trim();
  const L=['BEGIN:VCARD','VERSION:3.0',`N:${m.lastName||fam.householdName||''};${m.firstName||''};;;`,`FN:${full}`,`ORG:${fam.householdName||''} family`];
  if(m.cell) L.push(`TEL;TYPE=CELL:${m.cell}`);
  if(m.phone) L.push(`TEL;TYPE=HOME,VOICE:${m.phone}`);
  if(!m.phone && !m.cell && c.phone) L.push(`TEL;TYPE=HOME,VOICE:${c.phone}`);
  if(m.email) L.push(`EMAIL;TYPE=INTERNET:${m.email}`); else if(c.email) L.push(`EMAIL;TYPE=INTERNET:${c.email}`);
  if(c.address) L.push(`ADR;TYPE=HOME:;;${String(c.address).replace(/,/g,'\\,').replace(/;/g,'\\;')};;;;`);
  if(m.birthday) L.push(`BDAY:${m.birthday}`);
  L.push('END:VCARD'); return L.join('\r\n'); }
window.__dlVcardAll=()=>{ const v=allMembers().map(({m,f})=>memberVCard(m,f)).join('\r\n'); if(!v){ toast('No contacts yet',true); return; } download('family-phonebook.vcf', v, 'text/vcard;charset=utf-8'); toast('Phone book (vCard) downloaded'); };
window.__dlVcardFam=(fid)=>{ const f=findFam(fid); const v=(f.members||[]).map(m=>memberVCard(m,f)).join('\r\n'); if(!v){ toast('No members',true); return; } download(`${f.householdName}-contacts.vcf`, v, 'text/vcard;charset=utf-8'); };
function csvCell(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
window.__dlCsv=()=>{ const rows=[['First name','Last name','Family','Relation','Phone','Cell','Email','Address','Hebrew name','Birthday']];
  allMembers().forEach(({m,f})=>{ const c=f.contact||{}; rows.push([m.firstName,m.lastName||f.householdName,f.householdName,m.relation,m.phone||c.phone||'',m.cell||'',m.email||c.email||'',c.address||'',m.hebrewName||'',m.birthday||'']); });
  if(rows.length<2){ toast('No contacts yet',true); return; }
  download('family-phonebook.csv', rows.map(r=>r.map(csvCell).join(',')).join('\r\n'), 'text/csv;charset=utf-8'); toast('CSV downloaded'); };
function icsEsc(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n'); }
function icsDate(d){ return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
function buildICS(events, years=20){
  const now=new Date(); const start=new Date(now.getFullYear(),0,1); const end=new Date(now.getFullYear()+years,11,31);
  const stamp=icsDate(now)+'T000000Z';
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Family Portal//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  events.forEach(ev=>{ occurrencesInRange(ev,start,end).forEach(o=>{ const d=o.date; const dn=new Date(d); dn.setDate(dn.getDate()+1);
    const label=occLabel(ev,o.years); const hl=hebLabel(o.hdate||hFromGreg(d));
    const uid=(ev.familyId||'fam')+'-'+(ev.id||'ev')+'-'+icsDate(d)+'@familyportal';
    L.push('BEGIN:VEVENT',`UID:${uid}`,`DTSTAMP:${stamp}`,`DTSTART;VALUE=DATE:${icsDate(d)}`,`DTEND;VALUE=DATE:${icsDate(dn)}`,
      `SUMMARY:${icsEsc(TYPE_LABEL[ev.type]+': '+label)}`,
      `DESCRIPTION:${icsEsc((ev.householdName?ev.householdName+' family. ':'')+'Hebrew date: '+hl.en+(ev.notes?'. '+ev.notes:''))}`,
      'TRANSP:TRANSPARENT','END:VEVENT'); }); });
  L.push('END:VCALENDAR'); return L.join('\r\n'); }
window.__dlIcsAll=()=>{ const evs=allEvents(); if(!evs.length){ toast('No events yet',true); return; } download('family-events.ics', buildICS(evs,20), 'text/calendar;charset=utf-8'); toast('Calendar file (.ics) downloaded — open it to add to your calendar'); };
window.__dlIcsFam=(fid)=>{ const f=findFam(fid); const evs=familyEvents(f); if(!evs.length){ toast('No events',true); return; } download(`${f.householdName}-events.ics`, buildICS(evs,20), 'text/calendar;charset=utf-8'); };
window.__dlIcsEvent=(fid,eid)=>{ const f=findFam(fid); const e=(f.events||[]).find(x=>x.id===eid); if(!e){ toast('Not found',true); return; }
  download(`${(e.title||'event').replace(/[^a-z0-9]+/gi,'-').slice(0,40)}.ics`, buildICS([{...e,familyId:f.id,householdName:f.householdName}],20), 'text/calendar;charset=utf-8'); toast('Event .ics downloaded'); };

/* ---- Designed print / PDF (uses the browser's "Save as PDF") ---- */
function printReport(type){
  const area=$('#printArea'); const today=new Date();
  const dateStr=today.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const hToday=hebLabel(hFromGreg(today)).en;
  let title='', body='';
  if(type==='events'){
    title='Upcoming Events & Yahrzeits';
    const list=upcoming(400); let lastMonth='';
    if(!list.length){ body='<p>No upcoming events in the next year.</p>'; }
    list.forEach(ev=>{ const d=ev.occ; const mk=d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
      if(mk!==lastMonth){ if(lastMonth) body+='</tbody></table>'; body+=`<div class="pr-month">${mk}</div><table class="pr"><thead><tr><th style="width:16%">Date</th><th style="width:30%">Yiddish / Hebrew</th><th>Event</th><th style="width:18%">Family</th></tr></thead><tbody>`; lastMonth=mk; }
      const hl=hebLabel(ev.hdate);
      body+=`<tr><td>${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</td><td><span class="heb">${hl.he}</span><div style="font-size:10px;color:#666">${hl.en}</div></td><td><b>${esc(TYPE_LABEL[ev.type])}:</b> ${esc(occLabel(ev,ev.years))}</td><td>${esc(ev.householdName)}</td></tr>`;
    });
    if(list.length) body+='</tbody></table>';
  } else { // phonebook
    title='Family Phone Book';
    body=DB.families.map(f=>{ const c=f.contact||{};
      const rows=(f.members||[]).map(m=>`<tr><td><b>${esc(m.firstName)} ${esc(m.lastName||f.householdName)}</b>${m.hebrewName?` <span class="heb">${esc(m.hebrewName)}</span>`:''}</td><td>${esc(m.relation||'')}</td><td>${esc(m.cell||'')}</td><td>${esc(m.phone||c.phone||'')}</td><td>${esc(m.email||c.email||'')}</td></tr>`).join('')||'<tr><td colspan="5" style="color:#888">No members listed</td></tr>';
      return `<div class="pr-fam"><h3>${esc(f.householdName)} family${c.address?` <span class="addr">— ${esc(c.address)}</span>`:''}</h3>
        <table class="pr"><thead><tr><th style="width:26%">Name</th><th style="width:14%">Relation</th><th style="width:18%">Cell</th><th style="width:18%">Phone</th><th>Email</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }).join('');
  }
  area.innerHTML=`<div class="pr-head"><div class="pr-title">${esc(DB.meta.communityName)}</div><div class="pr-sub">${title}<br>Generated ${dateStr}<br>${hToday}</div></div>${body}
    <div class="pr-foot">${esc(DB.meta.communityName)} · ${title} · dates by the Hebrew (Yiddish) calendar</div>`;
  setTimeout(()=>window.print(), 60);
}

window.__printCal=(tplId)=>{ const y=+$('#pc_y').value||new Date().getFullYear(); const m=+$('#pc_m').value||0; closeModal(); buildPrintCalendar(y,m,tplId); };
function buildPrintCalendar(year, month, tplId){
  const t=CAL_TEMPLATES.find(x=>x.id===tplId)||CAL_TEMPLATES[0];
  setPrintPage('landscape');
  const monthsEN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const first=new Date(year,month,1,12); const startDow=first.getDay();
  const gridStart=new Date(year,month,1-startDow,12); const gridEnd=new Date(gridStart); gridEnd.setDate(gridEnd.getDate()+41);
  const h1=hFromGreg(first), hLast=hFromGreg(new Date(year,month+1,0,12));
  let hebm=HEB_MONTH_HE[h1.getMonth()]+' '+gematriya(h1.getFullYear()%1000);
  if(hLast.getMonth()!==h1.getMonth()) hebm=HEB_MONTH_HE[h1.getMonth()]+' – '+HEB_MONTH_HE[hLast.getMonth()]+' '+gematriya(hLast.getFullYear()%1000);
  const buckets={}; allEvents().forEach(ev=>occurrencesInRange(ev,gridStart,gridEnd).forEach(o=>{ const k=dateKey(o.date); (buckets[k]=buckets[k]||[]).push({...ev,_label:occLabel(ev,o.years)}); }));
  const hbuckets=holidayBuckets(gridStart,gridEnd);
  const DOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  let rows='';
  for(let w=0;w<6;w++){ rows+='<tr>';
    for(let dow=0;dow<7;dow++){ const dt=new Date(gridStart); dt.setDate(dt.getDate()+(w*7+dow));
      const out=dt.getMonth()!==month; const hd=hFromGreg(dt); const k=dateKey(dt);
      const hols=(hbuckets[k]||[]).slice(0,3).map(h=>`<span class="pc-hol">${esc(h.label)}</span>`).join('');
      const evs=(buckets[k]||[]).slice(0,4).map(ev=>`<span class="pc-ev">${ev.photo?`<img src="${ev.photo}">`:`<span class="dotc" style="background:${TYPE_COLOR[ev.type]}"></span>`}${esc(ev._label||ev.title)}</span>`).join('');
      rows+=`<td class="${out?'out':''}"><span class="pc-dnum">${dt.getDate()}</span><span class="pc-dheb">${gematriya(hd.getDate())}</span><div style="clear:both"></div>${hols}${evs}</td>`;
    } rows+='</tr>'; }
  const vars=`--pch:${t.head};--pcfg:${t.fg};--pca:${t.accent};--pcl:${t.line};--pchl:${t.hol};--pco:${t.out};--pcn:${t.num};--pcf:${t.font};--pct:${t.title}`;
  $('#printArea').innerHTML=`<div class="cal-print" style="${vars}">
    <div class="pc-band"><div><div class="pc-title">${monthsEN[month]} ${year}</div><div class="pc-hebm heb">${hebm}</div></div>
      <div class="pc-sub">${esc(DB.meta.communityName)}<br>Yiddish &amp; English calendar</div></div>
    <table class="pcal"><thead><tr>${DOW.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>
    <div class="pr-foot" style="color:#999">${esc(DB.meta.communityName)} · ${monthsEN[month]} ${year} · dates by the Hebrew (Yiddish) calendar</div>
  </div>`;
  setTimeout(()=>window.print(),90);
}

// Hebrew (Yiddish) date inputs -> set the underlying English date
window.__evHeToGreg=()=>{
  const m=+$('#eh_m').value, y=+$('#eh_y').value, dRaw=+$('#eh_d').value;
  if(!m||!y||!dRaw){ window.__evPreview(); return; }
  try{ let mm=m; if(mm===13 && !HDate.isLeapYear(y)) mm=12;
    const dim=HDate.daysInMonth(mm,y); const d=Math.min(dRaw,dim);
    const g=new HDate(d,mm,y).greg();
    $('#e_dt').value=g.getFullYear()+'-'+String(g.getMonth()+1).padStart(2,'0')+'-'+String(g.getDate()).padStart(2,'0');
  }catch(e){}
  window.__evPreview();
};
// live "wired together" Yiddish + English preview in the event form
window.__evPreview=()=>{
  const box=$('#e_preview'); if(!box) return;
  const dt=$('#e_dt').value;
  if(!dt){ box.innerHTML='Pick a date to see the Yiddish &amp; English dates.'; return; }
  const d=gregToDate(dt); const hl=hebLabel(hFromGreg(d));
  const rec=$('#e_rec').value, freq=$('#e_freq').value;
  let block=`<b>English:</b> ${d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}<br>`+
            `<b>Yiddish / Hebrew:</b> <span class="heb">${hl.he}</span> — ${hl.en}`;
  if(freq!=='once'){
    const s=new Date(); s.setHours(0,0,0,0); const e2=new Date(s); e2.setFullYear(e2.getFullYear()+3);
    const occ=occurrencesInRange({gregDate:dt,recurrence:rec,frequency:'yearly'}, s, e2).slice(0,3);
    if(occ.length) block+=`<div style="margin-top:6px"><b>Next occurrences (${rec==='gregorian'?'English':'Hebrew'} date):</b><br>`+
      occ.map(o=>`${o.date.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'})} · <span class="heb">${hebLabel(o.hdate||hFromGreg(o.date)).he}</span>`).join('<br>')+`</div>`;
  } else { block+=`<div style="margin-top:6px" class="note">One-time event — shows once on this date.</div>`; }
  box.innerHTML=block;
};

    <div class="modal-actions"><button class="btn ghost" onclick="window.__closeModal()">Cancel</button><button class="btn" onclick="window.__saveFamMeta('${fid||''}')">Save</button></div>`); };
window.__saveFamMeta=(fid)=>guarded(async()=>{ const hh=$('#a_hh').value.trim(), un=$('#a_un').value.trim().toLowerCase(), pin=$('#a_pin').value.trim();
  if(!hh||!un||!pin){ toast('All fields required',true); return; }
  if(DB.families.some(f=>f.id!==fid && (f.username||'').toLowerCase()===un) || un===FULL.meta.adminUser.toLowerCase()){ toast('Username taken',true); return; }
  if(fid){ const f=findFam(fid); f.householdName=hh; f.username=un; f.pin=pin; } else { DB.families.push({ id:uid(), householdName:hh, username:un, pin, contact:{}, members:[], events:[] }); }
  await Store.saveHousehold(); closeModal(); refreshCurrent(); toast('Saved'); });
window.__delFam=(fid)=>{ const f=findFam(fid); if(!confirm(`Delete the ${f.householdName} family and all their data?`))return;
  guarded(async()=>{ await Store.deleteHousehold(fid); DB.families=DB.families.filter(x=>x.id!==fid); refreshCurrent(); toast('Deleted'); }); };
window.__saveSettings=()=>guarded(async()=>{ DB.meta.communityName=$('#s_cn').value.trim()||DB.meta.communityName;
  if(!BACKEND){ FULL.meta.adminUser=$('#s_au').value.trim()||FULL.meta.adminUser; FULL.meta.adminPin=$('#s_ap').value.trim()||FULL.meta.adminPin; }
  await Store.saveSettings(); $('#commName').textContent=DB.meta.communityName; renderAdmin(); toast('Settings saved'); });
window.__exportData=()=>{ const payload = BACKEND ? { meta:DB.meta, families:DB.families } : Store.exportAll();
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='family-portal-data.json'; a.click(); URL.revokeObjectURL(a.href); };
window.__importData=(input)=>{ const file=input.files[0]; if(!file)return; const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result); if(!data.families||!data.meta) throw new Error('bad');
    Store.importAll(data); toast('Data imported'); renderAdmin(); }catch(e){ toast('Not a valid portal export file',true); } }; r.readAsText(file); };
window.__resetData=()=>{ if(!confirm('Replace ALL data with the sample data?'))return; Store.resetAll(); toast('Reset complete'); renderAdmin(); };
window.__printView=()=>{ go('calendar'); setTimeout(()=>window.print(),300); };

/* ============================================================
   NOTIFICATIONS / PWA
   ============================================================ */
let SW_REG=null;
async function initSW(){ if('serviceWorker' in navigator){ try{ SW_REG=await navigator.serviceWorker.register('sw.js'); }catch(e){ /* file served? */ } } }
async function enableReminders(){
  if(!('Notification' in window)){ toast('This browser has no notification support',true); return; }
  let perm=Notification.permission;
  if(perm!=='granted') perm=await Notification.requestPermission();
  if(perm!=='granted'){ toast('Notifications are blocked — allow them in your browser settings',true); return; }
  updateBell(); toast('Reminders are on for this browser');
  await subscribePush();
  checkDueReminders(true);
}
function urlB64ToUint8(base64){ const pad='='.repeat((4-base64.length%4)%4); const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i); return arr; }
async function subscribePush(){
  if(!BACKEND || !VAPID_PUBLIC_KEY || !SW_REG || !('PushManager' in window)) return;
  try{ const sub=await SW_REG.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC_KEY) });
    const { data:{ session } }=await supa.auth.getSession();
    await supa.from('push_subscriptions').upsert({ user_id:session.user.id, endpoint:sub.endpoint, sub:sub.toJSON() }, { onConflict:'endpoint' });
    toast('App push enabled');
  }catch(e){ console.warn('push subscribe failed',e); }
}
function updateBell(){ const b=$('#bellBtn'); if(!b) return;
  const on=('Notification' in window) && Notification.permission==='granted';
  b.textContent=on?'🔔':'🔕'; b.title=on?'Reminders on (click to refresh)':'Turn on reminders'; }
function checkDueReminders(force){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const due=dueReminders(60).filter(ev=>ev.remind&&ev.remind.channels&&ev.remind.channels.browser);
  const mine=due.filter(ev=> SESSION.isAdmin || ev.familyId===SESSION.familyId || ev.remind.notify==='custom');
  const shownKey='remindShown.'+dateKey(new Date()); let shown={}; try{ shown=JSON.parse(localStorage.getItem(shownKey)||'{}'); }catch(e){}
  mine.forEach(ev=>{ const id=ev.familyId+'|'+ev.id+'|'+dateKey(ev.occ); if(shown[id]&&!force) return; shown[id]=1;
    const when=ev.daysUntil===0?'today':ev.daysUntil===1?'tomorrow':`in ${ev.daysUntil} days`;
    try{ new Notification(`${TYPE_LABEL[ev.type]}: ${ev.title}`, { body:`${ev.householdName} family · ${when} · ${hebLabel(hFromGreg(ev.occ)).en}`, tag:id }); }catch(e){}
  });
  try{ localStorage.setItem(shownKey, JSON.stringify(shown)); }catch(e){}
}
const _bell=$('#bellBtn'); if(_bell) _bell.addEventListener('click', enableReminders);

/* ============================================================
   UTIL + BOOT
   ============================================================ */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---- profile picture helpers (resize to a small thumbnail data URL) ---- */
function fileToThumb(file, max=160){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{ const s=Math.min(1,max/Math.max(img.width,img.height));
    const w=Math.max(1,Math.round(img.width*s)), h=Math.max(1,Math.round(img.height*s));
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    try{ res(c.toDataURL('image/jpeg',0.82)); }catch(e){ rej(e); } };
    img.onerror=rej; img.src=r.result; };
  r.onerror=rej; r.readAsDataURL(file); }); }
window.__onPhotoPick=async(input,targetId,previewId)=>{ const f=input.files&&input.files[0]; if(!f)return;
  try{ const url=await fileToThumb(f,160); const t=document.getElementById(targetId); if(t) t.value=url;
    const pv=document.getElementById(previewId); if(pv){ pv.src=url; pv.style.display='block'; } }
  catch(e){ toast('Could not load image',true); } };
window.__clearPhoto=(targetId,previewId)=>{ const t=document.getElementById(targetId); if(t) t.value='';
  const pv=document.getElementById(previewId); if(pv){ pv.src=''; pv.style.display='none'; } };
function photoField(id, current){ return `<div class="full"><label class="fl">Profile picture <span class="note">— shown on the calendar</span></label>
  <div style="display:flex;gap:10px;align-items:center">
    <img id="${id}_pv" src="${esc(current||'')}" class="avatar" style="width:52px;height:52px;display:${current?'block':'none'}">
    <input type="hidden" id="${id}" value="${esc(current||'')}">
    <input type="file" accept="image/*" onchange="window.__onPhotoPick(this,'${id}','${id}_pv')" style="flex:1;padding:8px">
    <button type="button" class="btn ghost sm" onclick="window.__clearPhoto('${id}','${id}_pv')">Remove</button>
  </div></div>`; }

(async function boot(){
  try{
    const hasSession = await Store.boot();
    renderLogin();
    if(hasSession) startApp();
  }catch(err){
    console.error(err);
    renderLogin();
    toast('Could not reach the backend — check your Supabase keys.', true);
  }
})();
</script>
